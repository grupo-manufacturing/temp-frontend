<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Responza</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <!-- Home: connect -->
    <section id="view-home" class="view view--home panel-narrow" aria-label="Connect accounts">
      <header class="view-head">
        <h1 class="app-title">Responza</h1>
        <p class="app-tagline">Instagram &amp; WhatsApp messaging</p>
      </header>
      <div class="stack gap-lg">
        <button type="button" id="connect-instagram-btn" class="btn btn-block btn-connect btn-connect--ig" onclick="connectInstagram()">
          Connect Instagram
        </button>
        <button type="button" id="connect-whatsapp-btn" class="btn btn-block btn-connect btn-connect--wa" onclick="connectWhatsapp()">
          Connect WhatsApp
        </button>
      </div>
      <p class="err" id="global-error" hidden></p>
    </section>

    <!-- After connection: account details -->
    <section id="view-connected" class="view view--connected panel-narrow" hidden aria-label="Account details">
      <header class="view-head">
        <h1 class="view-title">Connected</h1>
        <p class="view-sub">Your linked account details</p>
      </header>

      <div id="panel-instagram" class="info-panel info-panel--ig" hidden>
        <h2 class="panel-title">Instagram</h2>
        <dl class="kv">
          <dt>User ID</dt>
          <dd><code id="ig-value-user-id">—</code></dd>
          <dt>Username</dt>
          <dd><code id="ig-value-username">—</code></dd>
        </dl>
      </div>

      <div id="panel-whatsapp" class="info-panel info-panel--wa" hidden>
        <h2 class="panel-title">WhatsApp</h2>
        <dl class="kv">
          <dt>Phone number ID</dt>
          <dd><code id="wa-value-phone-id">—</code></dd>
          <dt>WABA ID</dt>
          <dd><code id="wa-value-waba-id">—</code></dd>
        </dl>
      </div>

      <div class="stack gap-sm">
        <button type="button" id="btn-go-inbox" class="btn btn-primary btn-block" onclick="goToInbox()">
          Go to Inbox
        </button>
        <button type="button" class="btn btn-ghost btn-block" onclick="showView('home')">
          Back
        </button>
      </div>
      <p class="err" id="global-error-connected" hidden></p>
    </section>

    <!-- Inbox: conversations + chat -->
    <section id="view-inbox" class="view view--inbox" hidden data-active-channel="instagram" aria-label="Inbox">
      <header class="inbox-top" id="inbox-top">
        <div class="inbox-top-left">
          <button type="button" class="link-back" onclick="leaveInbox()">← Back</button>
          <span class="inbox-top-title">Inbox</span>
        </div>
        <div class="inbox-top-trail">
          <div id="inbox-connect-actions" class="inbox-connect-actions" hidden></div>
          <div id="inbox-channel-switch" class="channel-switch" hidden></div>
        </div>
      </header>
      <div class="inbox-split">
        <aside class="inbox-conversations" aria-label="Conversations">
          <div id="thread-list" class="thread-list"></div>
        </aside>
        <div class="inbox-chat-col">
          <div id="inbox-chat-header" class="inbox-chat-header"></div>
          <div id="chat-stream" class="chat-stream"></div>
          <footer class="inbox-compose">
            <div class="compose-shell">
              <label class="sr-only" for="reply-input">Message</label>
              <textarea id="reply-input" class="reply-input" rows="1" maxlength="1000" placeholder="Select a conversation…" disabled></textarea>
              <button type="button" id="reply-send" class="btn btn-send" disabled>Send</button>
            </div>
          </footer>
        </div>
      </div>
      <p class="err inbox-err" id="inbox-error" hidden></p>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
